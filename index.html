<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#D4622A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Done.">
<title>Done. — Task Manager</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F5F0E8;--surface:#FDFAF4;--ink:#1C1A16;--ink-light:#8A8074;--accent:#D4622A;--accent-light:#F2D5C4;--green:#4A7C59;--green-light:#D4E8DB;--border:#E0D8CC;--shadow:0 2px 12px rgba(28,26,22,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:0 0 80px;overscroll-behavior:none;}
  #offline-bar{display:none;background:#5A5040;color:rgba(255,255,255,0.85);text-align:center;font-size:11px;padding:6px;}
  #offline-bar.show{display:block;}
  #install-banner{display:none;background:var(--accent);color:white;padding:10px 16px;align-items:center;gap:10px;font-size:13px;font-weight:500;}
  #install-banner.show{display:flex;}
  #install-banner span{flex:1;}
  .install-btn{background:white;color:var(--accent);border:none;border-radius:8px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
  .install-dismiss{background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:18px;cursor:pointer;padding:0 4px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:28px 24px 20px;position:sticky;top:0;z-index:10;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
  .logo{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;letter-spacing:-0.5px;color:var(--ink);}
  .logo span{color:var(--accent);}
  .date-tag{font-size:11px;font-weight:500;color:var(--ink-light);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 12px;margin-top:6px;}
  .progress-wrap{display:flex;align-items:center;gap:10px;}
  .progress-bar{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.4s ease;width:0%;}
  .progress-label{font-size:12px;color:var(--ink-light);font-weight:500;white-space:nowrap;}
  main{padding:20px 20px 0;}
  .input-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:24px;box-shadow:var(--shadow);}
  .input-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;}
  #task-input{flex:1;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--ink);outline:none;padding:4px 0;}
  #task-input::placeholder{color:var(--ink-light);}
  .add-btn{width:36px;height:36px;background:var(--accent);border:none;border-radius:10px;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s,background 0.15s;flex-shrink:0;}
  .add-btn:active{transform:scale(0.92);background:#B8521F;}
  .tags-row{display:flex;gap:6px;flex-wrap:wrap;}
  .tag-btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--ink-light);cursor:pointer;transition:all 0.15s;}
  .tag-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
  .filter-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;}
  .filter-tab{flex:1;padding:8px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink-light);border-radius:8px;cursor:pointer;transition:all 0.15s;}
  .filter-tab.active{background:var(--ink);color:white;}
  .section-label{font-size:10px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-light);margin-bottom:10px;padding-left:4px;}
  .task-list{display:flex;flex-direction:column;gap:8px;}
  .task-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;box-shadow:var(--shadow);animation:slideIn 0.25s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
  .task-item.done{opacity:0.55;}
  .task-item.done .task-text{text-decoration:line-through;color:var(--ink-light);}
  .check-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:1px;}
  .check-btn.checked{background:var(--green);border-color:var(--green);}
  .check-btn.checked::after{content:'✓';color:white;font-size:11px;font-weight:700;}
  .task-body{flex:1;min-width:0;}
  .task-text{font-size:14px;line-height:1.45;color:var(--ink);word-break:break-word;}
  .task-meta{display:flex;align-items:center;gap:8px;margin-top:5px;}
  .task-category{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;}
  .cat-work{background:#E8EFF7;color:#3A6090;}
  .cat-personal{background:var(--accent-light);color:var(--accent);}
  .cat-health{background:var(--green-light);color:var(--green);}
  .cat-other{background:var(--bg);color:var(--ink-light);border:1px solid var(--border);}
  .task-time{font-size:10px;color:var(--ink-light);}
  .delete-btn{background:transparent;border:none;color:var(--border);font-size:16px;cursor:pointer;padding:2px;transition:color 0.15s;line-height:1;flex-shrink:0;}
  .delete-btn:active{color:#C0392B;}
  .empty-state{text-align:center;padding:48px 24px;color:var(--ink-light);}
  .empty-icon{font-size:36px;margin-bottom:12px;}
  .empty-state p{font-family:'Playfair Display',serif;font-size:16px;color:var(--ink-light);}
  .clear-btn{display:block;width:100%;margin-top:16px;padding:12px;border:1.5px dashed var(--border);background:transparent;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink-light);cursor:pointer;transition:all 0.15s;}
  .clear-btn:active{background:var(--bg);color:var(--accent);border-color:var(--accent);}
  .spacer{height:20px;}
</style>
</head>
<body>
<div id="offline-bar">⚡ You're offline — your tasks are saved locally</div>
<div id="install-banner">
  <span>📲 Add Done. to your home screen!</span>
  <button class="install-btn" id="install-btn">Install</button>
  <button class="install-dismiss" id="install-dismiss">×</button>
</div>
<header>
  <div class="header-top">
    <div class="logo">Done<span>.</span></div>
    <div class="date-tag" id="date-tag"></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">0 / 0</div>
  </div>
</header>
<main>
  <div class="input-section">
    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add a new task…" maxlength="120">
      <button class="add-btn" id="add-btn">+</button>
    </div>
    <div class="tags-row" id="tags-row">
      <button class="tag-btn active" data-cat="personal">Personal</button>
      <button class="tag-btn" data-cat="work">Work</button>
      <button class="tag-btn" data-cat="health">Health</button>
      <button class="tag-btn" data-cat="other">Other</button>
    </div>
  </div>
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all">All</button>
    <button class="filter-tab" data-filter="active">Active</button>
    <button class="filter-tab" data-filter="done">Done</button>
  </div>
  <div class="section-label" id="section-label">Tasks</div>
  <div class="task-list" id="task-list"></div>
  <button class="clear-btn" id="clear-btn" style="display:none">Clear completed tasks</button>
  <div class="spacer"></div>
</main>
<script>
  let tasks=JSON.parse(localStorage.getItem('done-tasks')||'[]');
  let selectedCat='personal',activeFilter='all';
  function save(){localStorage.setItem('done-tasks',JSON.stringify(tasks));}
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now=new Date();
  document.getElementById('date-tag').textContent=`${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('tags-row').addEventListener('click',e=>{
    const btn=e.target.closest('.tag-btn');if(!btn)return;
    document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');selectedCat=btn.dataset.cat;
  });
  document.querySelectorAll('.filter-tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');activeFilter=tab.dataset.filter;render();
    });
  });
  document.getElementById('add-btn').addEventListener('click',addTask);
  document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
  function addTask(){
    const input=document.getElementById('task-input');
    const text=input.value.trim();if(!text)return;
    tasks.unshift({id:Date.now(),text,cat:selectedCat,done:false,time:formatTime(new Date())});
    input.value='';save();render();
  }
  function formatTime(d){let h=d.getHours(),m=d.getMinutes(),ampm=h>=12?'pm':'am';h=h%12||12;return `${h}:${String(m).padStart(2,'0')} ${ampm}`;}
  function toggleDone(id){const t=tasks.find(t=>t.id===id);if(t)t.done=!t.done;save();render();}
  function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);save();render();}
  document.getElementById('clear-btn').addEventListener('click',()=>{tasks=tasks.filter(t=>!t.done);save();render();});
  function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function render(){
    const done=tasks.filter(t=>t.done).length,total=tasks.length;
    const pct=total?Math.round((done/total)*100):0;
    document.getElementById('progress-fill').style.width=pct+'%';
    document.getElementById('progress-label').textContent=`${done} / ${total}`;
    let filtered=tasks;
    if(activeFilter==='active')filtered=tasks.filter(t=>!t.done);
    else if(activeFilter==='done')filtered=tasks.filter(t=>t.done);
    document.getElementById('section-label').textContent=activeFilter==='all'?`All Tasks (${total})`:activeFilter==='active'?`Active (${filtered.length})`:`Completed (${filtered.length})`;
    document.getElementById('clear-btn').style.display=done>0?'block':'none';
    const taskList=document.getElementById('task-list');
    if(!filtered.length){taskList.innerHTML=`<div class="empty-state"><div class="empty-icon">${activeFilter==='done'?'🎉':'📋'}</div><p>${activeFilter==='done'?'Nothing done yet':'No tasks here'}</p></div>`;return;}
    taskList.innerHTML=filtered.map(t=>`<div class="task-item ${t.done?'done':''}"><button class="check-btn ${t.done?'checked':''}" onclick="toggleDone(${t.id})"></button><div class="task-body"><div class="task-text">${escHtml(t.text)}</div><div class="task-meta"><span class="task-category cat-${t.cat}">${t.cat}</span><span class="task-time">${t.time}</span></div></div><button class="delete-btn" onclick="deleteTask(${t.id})">×</button></div>`).join('');
  }
  render();
  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(console.error);}
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('show');});
  document.getElementById('install-btn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});
  document.getElementById('install-dismiss').addEventListener('click',()=>{document.getElementById('install-banner').classList.remove('show');});
  function updateOnlineStatus(){document.getElementById('offline-bar').classList.toggle('show',!navigator.onLine);}
  window.addEventListener('online',updateOnlineStatus);
  window.addEventListener('offline',updateOnlineStatus);
  updateOnlineStatus();
</script>
</body>
</html>
